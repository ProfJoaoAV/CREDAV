<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Que Sabe a Lua - Edição Alargada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .board-container { position: relative; display: inline-block; width: 100%; max-width: fit-content; }
        #board-img { display: block; width: 100%; height: auto; max-height: 75vh; border-radius: 12px; }
        .pawn {
            position: absolute; width: 4%; aspect-ratio: 1/1; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            color: white; transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 50; transform: translate(-50%, -50%); font-size: 1.2vw;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .pawn-afonso { background-color: #ef4444; border: 0.2vw solid white; }
        .pawn-filipe { background-color: #3b82f6; border: 0.2vw solid white; }
        .modal-overlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        .option-btn { transition: all 0.2s; border: 2px solid #334155; text-align: left; padding: 1rem; border-radius: 0.75rem; background: #1e293b; color: #cbd5e1; width: 100%; }
        .option-btn:hover { border-color: #3b82f6; background: #1e293b; }
        .option-correct { border-color: #10b981 !important; background-color: #064e3b !important; color: white !important; }
        .option-wrong { border-color: #ef4444 !important; background-color: #7f1d1d !important; color: white !important; }
        .badge-slot { filter: grayscale(1) opacity(0.3); transition: all 0.5s; }
        .badge-earned { filter: grayscale(0) opacity(1); transform: scale(1.1); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans overflow-hidden">

    <!-- Setup -->
    <div id="setup-screen" class="flex flex-col items-center justify-center h-screen space-y-6">
        <h1 class="text-5xl font-black text-yellow-400 uppercase tracking-tighter text-center px-4">A Que Sabe a Lua?</h1>
        <p class="text-slate-400 italic">Uma aventura sobre amizade e cooperação.</p>
        <div class="bg-slate-900 p-8 rounded-2xl border border-slate-800 w-80 shadow-2xl">
            <h2 class="mb-6 font-semibold text-center text-white text-lg">Quem vai jogar?</h2>
            <div class="space-y-4 mb-6">
                <label class="flex items-center gap-3 p-3 bg-slate-800 rounded-lg cursor-pointer border-2 border-transparent has-[:checked]:border-red-500">
                    <input type="checkbox" id="check-afonso" class="w-5 h-5"> Afonso (Vermelho)
                </label>
                <label class="flex items-center gap-3 p-3 bg-slate-800 rounded-lg cursor-pointer border-2 border-transparent has-[:checked]:border-blue-500">
                    <input type="checkbox" id="check-filipe" class="w-5 h-5"> Filipe (Azul)
                </label>
            </div>
            <button onclick="startGame()" class="w-full py-4 bg-yellow-500 text-slate-950 font-black rounded-xl hover:bg-yellow-400 transition-colors">COMEÇAR JOGO</button>
        </div>
    </div>

    <!-- Main Game -->
    <div id="game-screen" class="hidden flex flex-col lg:flex-row h-screen p-4 gap-4 overflow-hidden">
        
        <div id="board-wrapper" class="flex-grow flex flex-col items-center justify-center bg-slate-900 rounded-2xl border-4 border-slate-800 relative p-2 shadow-inner">
            <div class="board-container">
                <img id="board-img" src="https://profjoaoav.github.io/CREDAV/tabuleiro2.png" alt="Tabuleiro do Jogo">
                <div id="pawns-container"></div>
            </div>
        </div>

        <div class="lg:w-96 flex flex-col gap-4 shrink-0 overflow-y-auto">
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                <div class="mb-4 p-4 bg-slate-800 rounded-xl text-center border-b-4 border-yellow-500">
                    <p class="text-xs text-slate-500 uppercase font-bold">Vez de:</p>
                    <span id="current-player-name" class="text-2xl font-black text-yellow-400">-</span>
                </div>
                <button id="roll-btn" class="w-full py-6 bg-yellow-500 text-slate-950 font-black text-3xl rounded-2xl shadow-[0_4px_0_rgb(202,138,4)] active:translate-y-1 active:shadow-none transition-all disabled:opacity-50">LANÇAR DADO (1-2) 🎲</button>
                <div id="dice-result" class="text-center h-12 text-4xl font-black text-white mt-2"></div>
            </div>

            <div id="badges-panel" class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                <h3 class="text-center text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest">Insígnias dos Animais</h3>
                <div id="player-badges-container" class="grid grid-cols-4 gap-3"></div>
                <p id="win-condition-msg" class="mt-4 text-[10px] text-center text-red-400 font-bold uppercase hidden">⚠️ Precisas de todas as insígnias para vencer!</p>
            </div>
            
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 flex-grow text-xs text-slate-400">
                <h3 class="text-blue-400 font-bold mb-2 uppercase">Legenda:</h3>
                <ul class="space-y-2">
                    <li class="flex items-center gap-2"><span class="w-3 h-3 bg-white border border-slate-400 rounded-full"></span> <b>Animal:</b> Paragem obrigatória.</li>
                    <li class="flex items-center gap-2"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> <b>Casas ?:</b> Perguntas sobre a história.</li>
                    <li class="flex items-center gap-2"><span class="w-3 h-3 bg-yellow-500 rounded-full"></span> <b>Estrelas:</b> Desafios de reflexão e valores.</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="event-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
        <div class="bg-slate-900 border-2 border-blue-500 p-8 rounded-3xl max-w-lg w-full shadow-2xl text-center">
            <div id="modal-icon" class="text-6xl mb-4"></div>
            <h3 id="modal-title" class="text-blue-400 font-bold uppercase text-sm mb-2 tracking-widest"></h3>
            <p id="modal-text" class="text-xl font-medium mb-8 italic leading-relaxed"></p>
            <div id="modal-options" class="flex flex-col gap-3"></div>
        </div>
    </div>

        const animalQuestions = {

                { q: "Como é que os macacos demonstram afeto?", options: ["Dão apertos de mão", "Limpam o pelo uns dos outros", "Fazem caretas"], correct: 1 },
                { q: "Onde vivem a maioria dos macacos?", options: ["No mar", "Nas florestas tropicais", "No deserto"], correct: 1 }
            ],
            22: [
                { q: "Os dentes do rato param de crescer?", options: ["Sim", "Não, crescem sempre", "Só no inverno"], correct: 1 },
                { q: "Como é o olfato dos ratos?", options: ["Muito fraco", "Muito apurado", "Não têm olfato"], correct: 1 },
                { q: "Os ratos conseguem nadar?", options: ["Não, têm medo de água", "Sim, são ótimos nadadores", "Só com boias"], correct: 1 },
                { q: "Quanto tempo vive em média um rato doméstico?", options: ["10 anos", "1 a 3 anos", "20 anos"], correct: 1 },
                { q: "O que usam os ratos para se orientar no escuro?", options: ["Lanterna", "Os bigodes", "As orelhas"], correct: 1 }
            ]
        };

        const storyQuestions = [
            { q: "Quem foi o primeiro animal a tentar chegar à lua?", options: ["Elefante", "Girafa", "Tartaruga"], correct: 2 },
            { q: "Qual animal subiu para as costas da tartaruga?", options: ["Elefante", "Zebra", "Rato"], correct: 0 },
            { q: "Qual animal tem o pescoço mais comprido para tentar chegar à lua?", options: ["Leão", "Girafa", "Avestruz"], correct: 1 },
            { q: "Qual animal deu a trinca final na lua?", options: ["Macaco", "Raposa", "Rato"], correct: 2 },
            { q: "Quem ficou na base da “torre” de animais?", options: ["Rato", "Tartaruga", "Elefante"], correct: 1 },
            { q: "Quem foi o último animal a subir?", options: ["Macaco", "Leão", "Rato"], correct: 2 },
            { q: "Os animais ajudaram-se uns aos outros?", options: ["Sim, todos colaboraram", "Não, cada um tentou sozinho", "Só os maiores ajudaram"], correct: 0 },
            { q: "Como se sentiam os animais quando não conseguiam alcançar a lua?", options: ["Felizes", "Cansados", "Zangados"], correct: 1 },
            { q: "Todos os animais provaram a lua ou só um?", options: ["Só o rato comeu tudo", "Todos provaram, o rato partiu pedaços", "Nenhum animal conseguiu comer"], correct: 1 },
            { q: "O que fizeram os animais depois de provar a lua?", options: ["Foram procurar mais comida", "Dormiram todos juntos", "Foram nadar no rio"], correct: 1 },
            { q: "O que nos ensina esta história?", options: ["União, amizade e cooperação", "Que ser grande é o mais importante", "Que não devemos partilhar nada"], correct: 0 },
            { q: "Onde é que o peixe estava a ver tudo o que se passava?", options: ["No topo de uma árvore", "Na água/rio", "Atrás de uma nuvem"], correct: 1 },
            { q: "A lua parecia estar perto ou longe dos animais?", options: ["Perto", "Muito longe, no infinito", "Escondida no sol"], correct: 0 },
            { q: "O que a lua fazia quando os animais se aproximavam?", options: ["Ficava parada a rir", "Afastava-se um pouco/subia mais alto", "Caía para o chão"], correct: 1 },
            { q: "O pedacinho de lua sabia ao quê?", options: ["A queijo fresco", "A gelado de baunilha", "Ao que cada animal mais gostava"], correct: 2 }
        ];

        const reflectionQuestions = [
            { q: "A tartaruga conseguiu chegar à Lua sozinha? Porquê?", options: ["Sim, porque foi persistente.", "Não, sozinha não conseguia chegar tão alto.", "Sim, porque a Lua desceu."], correct: 1 },
            { q: "O que aconteceu quando os animais começaram a ajudar-se?", options: ["Ficaram mais confusos.", "Conseguiram chegar à Lua juntos.", "Cada um tentou à sua maneira."], correct: 1 },
            { q: "Se um animal tivesse ido embora, o que mudava?", options: ["Nada mudava.", "Podiam não conseguir chegar à Lua.", "A Lua ficava mais perto."], correct: 1 },
            { q: "Ajudar os outros torna o grupo mais forte ou mais fraco?", options: ["Mais fraco, demora mais tempo.", "Mais forte, porque todos contribuem.", "Não muda nada."], correct: 1 },
            { q: "Na história todos eram diferentes. Isso ajudou ou atrapalhou?", options: ["Atrapalhou, eram muito diferentes.", "Ajudou, cada um tinha uma capacidade diferente.", "Não teve importância."], correct: 1 },
            { q: "Achas que pedir ajuda é fácil ou difícil?", options: ["É sempre fácil.", "Às vezes é difícil, mas é importante.", "Nunca é necessário."], correct: 1 },
            { q: "Se a Lua fosse um objetivo difícil, o que ela representaria na vida real?", options: ["Uma coisa sem importância.", "Um objetivo difícil que quero alcançar.", "Apenas um objeto no céu."], correct: 1 },
            { q: "Como te sentes quando ajudas um amigo?", options: ["Mal, perco tempo", "Bem, sinto-me útil e feliz", "Indiferente"], correct: 1 },
            { q: "O peixe achou estranho os animais subirem uns aos outros. Porquê?", options: ["Porque ele não gostava de animais", "Porque ele via a Lua refletida na água ali perto", "Porque ele queria subir também"], correct: 1 },
            { q: "A união faz a força? Dá um exemplo do jogo.", options: ["Não, cada um joga por si", "Sim, precisamos de todos para ganhar insígnias", "Talvez"], correct: 1 },
            { q: "O que aprendemos com o Rato ser o que tocou na Lua?", options: ["Que os pequenos não servem para nada", "Que todos, independentemente do tamanho, são importantes", "Que ele teve sorte"], correct: 1 },
            { q: "Ouvir os outros é importante para trabalhar em equipa?", options: ["Não, eu sei tudo", "Sim, para entendermos como ajudar melhor", "Só às vezes"], correct: 1 },
            { q: "O que é a empatia?", options: ["Gostar de chocolate", "Colocar-se no lugar do outro", "Ganhar sempre"], correct: 1 },
            { q: "Partilhar o que conseguimos (como a Lua) é bom?", options: ["Não, quero tudo para mim", "Sim, torna a conquista mais especial", "Não sei"], correct: 1 },
            { q: "Qual é o valor mais importante desta história?", options: ["A pressa", "A amizade e cooperação", "A força física"], correct: 1 }
        ];

        // Lógica de Sorteio sem Repetição
        const pools = {
            animals: {},
            story: [...storyQuestions],
            reflection: [...reflectionQuestions]
        };

        function getQuestion(type, animalId = null) {
            let selectedList;
            if (type === 'animal') {
                if (!pools.animals[animalId] || pools.animals[animalId].length === 0) {
                    pools.animals[animalId] = [...animalQuestions[animalId]];
                }
                selectedList = pools.animals[animalId];
            } else if (type === 'story') {
                if (pools.story.length === 0) pools.story = [...storyQuestions];
                selectedList = pools.story;
            } else {
                if (pools.reflection.length === 0) pools.reflection = [...reflectionQuestions];
                selectedList = pools.reflection;
            }

            const index = Math.floor(Math.random() * selectedList.length);
            return selectedList.splice(index, 1)[0];
        }

        let players = [], currentPlayerIndex = 0;
        let playerState = { 
            'Afonso': { pos: 0, lastPos: 0, color: 'pawn-afonso', badges: [] }, 
            'Filipe': { pos: 0, lastPos: 0, color: 'pawn-filipe', badges: [] } 
        };

        function startGame() {
            if (document.getElementById('check-afonso').checked) players.push('Afonso');
            if (document.getElementById('check-filipe').checked) players.push('Filipe');
            if (!players.length) return;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').classList.remove('hidden');
            players.forEach(p => movePawn(p));
            updateUI();
        }

        function updateUI() { 
            const name = players[currentPlayerIndex];
            document.getElementById('current-player-name').innerText = name;
            const container = document.getElementById('player-badges-container');
            container.innerHTML = '';
            Object.keys(animalInfo).forEach(id => {
                const info = animalInfo[id];
                const hasBadge = playerState[name].badges.includes(parseInt(id));
                const div = document.createElement('div');
                div.className = `badge-slot aspect-square bg-slate-800 rounded-xl flex items-center justify-center text-2xl border-2 ${hasBadge ? 'badge-earned border-yellow-500' : 'border-slate-700'}`;
                div.innerHTML = info.emoji;
                container.appendChild(div);
            });
            const canWin = playerState[name].badges.length === 8;
            document.getElementById('win-condition-msg').classList.toggle('hidden', canWin);
        }

        document.getElementById('roll-btn').onclick = function() {
            this.disabled = true;
            const die = Math.floor(Math.random() * 2) + 1;
            document.getElementById('dice-result').innerText = die;
            const name = players[currentPlayerIndex];
            const state = playerState[name];
            state.lastPos = state.pos;
            
            let nextPos = state.pos;
            for (let i = 1; i <= die; i++) {
                nextPos++;
                if (nextPos > 25) { nextPos = 25; break; }
                if (animalInfo[nextPos]) break;
            }

            if (nextPos >= 23 && state.badges.length < 8) { nextPos = 22; }

            state.pos = nextPos;
            movePawn(name);
            setTimeout(() => checkAction(state.pos, name), 900);
        };

        function checkAction(pos, name) {
            if (pos === 25) { 
                showModal("🌕", "Vitória!", `Parabéns ${name}! Chegaste à Lua!`, [{ text: "Recomeçar", action: () => location.reload() }]);
                return; 
            }
            
            if (animalInfo[pos]) {
                const info = animalInfo[pos];
                const q = getQuestion('animal', pos);
                showQ(q, `Insígnia: ${info.name}`, (correct) => {
                    if (correct) {
                        if (!playerState[name].badges.includes(pos)) playerState[name].badges.push(pos);
                        showModal(info.emoji, "Boa!", `Acertaste e ganhaste a insígnia da ${info.name}!`, [{ text: "Continuar", action: closeM }]);
                    } else { failMove(); }
                });
                return;
            }

            const qHouses = [2, 6, 9, 11, 15, 17, 21, 23];
            if (qHouses.includes(pos)) {
                showQ(getQuestion('story'), "História", (correct) => {
                    correct ? setTimeout(closeM, 1000) : failMove();
                });
                return;
            }

            const rHouses = [3, 5, 8, 12, 14, 18, 20, 24];
            if (rHouses.includes(pos)) {
                showQ(getQuestion('reflection'), "Reflexão e Valores", (correct) => {
                    correct ? setTimeout(closeM, 1000) : failMove();
                });
                return;
            }
            nextTurn();
        }

        function showQ(data, title, callback) {
            const container = document.getElementById('modal-options'); container.innerHTML = '';
            document.getElementById('modal-icon').innerText = title.includes("Insígnia") ? "🏅" : "✨";
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = data.q;
            data.options.forEach((opt, idx) => {
                const btn = document.createElement('button'); btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => {
                    const btns = container.querySelectorAll('button');
                    btns.forEach(b => b.onclick = null);
                    if (idx === data.correct) { 
                        btn.classList.add('option-correct'); callback(true);
                    } else { 
                        btn.classList.add('option-wrong'); 
                        btns[data.correct].classList.add('option-correct');
                        callback(false);
                    }
                };
                container.appendChild(btn);
            });
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function failMove() {
            const p = players[currentPlayerIndex]; 
            playerState[p].pos = playerState[p].lastPos;
            movePawn(p); 
            setTimeout(closeM, 1500);
        }

        function showModal(icon, title, text, buttons) {
            const container = document.getElementById('modal-options'); container.innerHTML = '';
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            buttons.forEach(b => {
                const btn = document.createElement('button'); btn.className = "w-full p-4 bg-yellow-500 text-slate-900 rounded-xl font-bold hover:bg-yellow-400";
                btn.innerText = b.text; btn.onclick = b.action;
                container.appendChild(btn);
            });
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function closeM() { document.getElementById('event-modal').classList.add('hidden'); nextTurn(); }
        function nextTurn() { 
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length; 
            document.getElementById('roll-btn').disabled = false; 
            updateUI(); 
        }

        function movePawn(n) {
            let p = document.getElementById('pawn-'+n);
            if (!p) { 
                p = document.createElement('div'); p.id = 'pawn-'+n; 
                p.className = 'pawn '+playerState[n].color; 
                p.innerText = n[0]; 
                document.getElementById('pawns-container').appendChild(p); 
            }
            p.style.left = gameCoordinates[playerState[n].pos].x + '%';
            p.style.top = gameCoordinates[playerState[n].pos].y + '%';
            
            const afonso = document.getElementById('pawn-Afonso');
            const filipe = document.getElementById('pawn-Filipe');
            if (afonso && filipe && playerState['Afonso'].pos === playerState['Filipe'].pos) {
                afonso.style.marginLeft = "-8px";
                filipe.style.marginLeft = "8px";
            } else {
                if(afonso) afonso.style.marginLeft = "0";
                if(filipe) filipe.style.marginLeft = "0";
            }
        }
    </script>
</body>
</html>
