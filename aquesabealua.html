<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Que Sabe a Lua - Edição Especial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .board-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: fit-content;
        }
        #board-img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
        }
        .pawn {
            position: absolute;
            width: 4%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            transform: translate(-50%, -50%);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            font-size: 1.2vw;
            pointer-events: none;
        }
        .pawn-afonso { background-color: #ef4444; border: 0.2vw solid #ffffff; }
        .pawn-filipe { background-color: #3b82f6; border: 0.2vw solid #ffffff; }
        
        .modal-overlay {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }
        
        .option-btn {
            transition: all 0.2s;
            border: 2px solid #334155;
        }
        .option-btn:hover {
            border-color: #3b82f6;
            background-color: #1e293b;
        }
        .option-correct {
            border-color: #10b981 !important;
            background-color: #064e3b !important;
        }
        .option-wrong {
            border-color: #ef4444 !important;
            background-color: #7f1d1d !important;
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans overflow-hidden">

    <div id="setup-screen" class="flex flex-col items-center justify-center h-screen space-y-6">
        <h1 class="text-5xl font-black text-yellow-400 tracking-tighter text-center px-4 uppercase">A Que Sabe a Lua?</h1>
        <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl border border-slate-800 w-full max-w-md text-center">
            <h2 class="text-xl mb-6 font-semibold">Escolher Jogadores</h2>
            <div class="space-y-4 mb-6">
                <label class="flex items-center justify-between cursor-pointer p-3 bg-slate-700 rounded-lg border-2 border-transparent has-[:checked]:border-red-500">
                    <span class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center font-bold">A</span>
                        <span>Afonso</span>
                    </span>
                    <input type="checkbox" id="check-afonso" class="w-6 h-6 rounded text-red-500">
                </label>
                <label class="flex items-center justify-between cursor-pointer p-3 bg-slate-700 rounded-lg border-2 border-transparent has-[:checked]:border-blue-500">
                    <span class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">F</span>
                        <span>Filipe</span>
                    </span>
                    <input type="checkbox" id="check-filipe" class="w-6 h-6 rounded text-blue-500">
                </label>
            </div>
            <button onclick="startGame()" class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-black text-lg rounded-xl shadow-xl">
                COMEÇAR JOGO
            </button>
        </div>
    </div>

    <div id="game-screen" class="hidden flex flex-col lg:flex-row h-screen p-4 gap-4 overflow-hidden">
        <div id="board-wrapper" class="flex-grow flex items-center justify-center overflow-auto bg-slate-900 rounded-2xl border-4 border-slate-800 relative p-2">
            <div class="board-container" id="board-container">
                <img id="board-img" src="https://profjoaoav.github.io/CREDAV/tabuleiro2.png" alt="Tabuleiro">
                <div id="pawns-container"></div>
            </div>
        </div>

        <div class="lg:w-80 flex flex-col gap-4 h-full shrink-0">
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                <div id="turn-info" class="mb-4 p-4 bg-slate-800 rounded-xl text-center">
                    <p class="text-xs uppercase text-slate-500 font-bold">Vez de:</p>
                    <span id="current-player-name" class="text-2xl font-black text-white">-</span>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div id="card-afonso" class="p-2 bg-slate-800 border rounded-lg text-center">
                        <p class="text-[10px] text-slate-400">Afonso</p>
                        <p id="pos-afonso" class="font-bold text-xs">Casa 0</p>
                    </div>
                    <div id="card-filipe" class="p-2 bg-slate-800 border rounded-lg text-center">
                        <p class="text-[10px] text-slate-400">Filipe</p>
                        <p id="pos-filipe" class="font-bold text-xs">Casa 0</p>
                    </div>
                </div>
                <button id="roll-btn" class="w-full py-6 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-black text-3xl rounded-2xl shadow-[0_4px_0_rgb(202,138,4)] active:translate-y-1 active:shadow-none transition-all">
                    DADO 🎲
                </button>
                <div id="dice-result" class="text-center h-12 text-4xl font-black text-yellow-400 mt-2"></div>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 flex-grow text-sm">
                <h3 class="font-bold text-blue-400 mb-2">REGRAS:</h3>
                <ul class="text-slate-400 space-y-1">
                    <li>• Dado de 3 faces (1-2-3).</li>
                    <li>• Errou Pergunta? Volta à casa anterior.</li>
                    <li>• Falhou Desafio? Volta à casa anterior.</li>
                </ul>
            </div>
        </div>
    </div>

    <div id="event-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
        <div class="bg-slate-900 border-2 border-blue-500 p-8 rounded-3xl max-w-lg w-full shadow-2xl text-center">
            <div id="modal-icon" class="text-5xl mb-4">❓</div>
            <h3 id="modal-title" class="text-blue-400 font-bold uppercase text-sm mb-2"></h3>
            <p id="modal-text" class="text-xl font-medium mb-8 leading-relaxed italic"></p>
            <div id="modal-options" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <script>
        const gameCoordinates = [
            {"x": 16.28, "y": 82.82}, {"x": 25.38, "y": 82.65}, {"x": 32.73, "y": 81.97},
            {"x": 41.55, "y": 82.98}, {"x": 52.76, "y": 82.48}, {"x": 59.92, "y": 82.98},
            {"x": 68.38, "y": 81.8}, {"x": 78.21, "y": 75.07}, {"x": 74.17, "y": 56.87},
            {"x": 65.25, "y": 56.87}, {"x": 56.8, "y": 55.69}, {"x": 47.79, "y": 57.38},
            {"x": 38.24, "y": 56.7}, {"x": 31.35, "y": 56.2}, {"x": 19.77, "y": 52.66},
            {"x": 12.24, "y": 50.64}, {"x": 7.64, "y": 33.96}, {"x": 18.76, "y": 29.92},
            {"x": 25.56, "y": 29.41}, {"x": 35.3, "y": 35.82}, {"x": 44.85, "y": 34.64},
            {"x": 52.48, "y": 33.96}, {"x": 64.7, "y": 31.77}, {"x": 72.33, "y": 27.39},
            {"x": 79.4, "y": 19.14}, {"x": 90.06, "y": 13.75}
        ];

        const questionHouses = [2, 6, 9, 11, 15, 17, 21, 23];
        const challengeHouses = [3, 5, 8, 12, 14, 18, 20, 24];
        
        const questionsData = [
            { q: "Quem foi o primeiro animal a tentar chegar à lua?", options: ["Tartaruga", "Peixe", "Leão"], correct: 0 },
            { q: "Qual animal subiu para as costas da tartaruga?", options: ["Zebra", "Elefante", "Girafa"], correct: 1 },
            { q: "Qual animal tem o pescoço mais comprido?", options: ["Girafa", "Zebra", "Rato"], correct: 0 },
            { q: "Qual animal deu a trinca final na lua?", options: ["Leão", "Rato", "Macaco"], correct: 1 },
            { q: "Quem ficou na base da torre de animais?", options: ["Elefante", "Girafa", "Tartaruga"], correct: 2 },
            { q: "Quem foi o último animal a subir?", options: ["Rato", "Zebra", "Peixe"], correct: 0 },
            { q: "Os animais ajudaram-se uns aos outros?", options: ["Sim", "Não", "Só às vezes"], correct: 0 },
            { q: "Como se sentiam os animais quando não chegavam à lua?", options: ["Zangados", "Cansados", "Assustados"], correct: 1 },
            { q: "Todos os animais provaram a lua?", options: ["Só o rato", "Só a tartaruga", "Sim, todos provaram"], correct: 2 },
            { q: "O que fizeram os animais depois de comer a lua?", options: ["Foram correr", "Dormiram todos juntos", "Foram nadar"], correct: 1 },
            { q: "O que nos ensina esta história?", options: ["União e Cooperação", "Comer depressa", "Ser o mais forte"], correct: 0 },
            { q: "Onde é que o peixe estava a ver tudo?", options: ["Na árvore", "Na água/rio", "Na lua"], correct: 1 },
            { q: "A lua parecia estar perto ou longe?", options: ["Muito longe", "Perto", "Invisível"], correct: 1 },
            { q: "O que a lua fazia quando os animais se aproximavam?", options: ["Afastava-se um pouco", "Ficava maior", "Caía"], correct: 0 },
            { q: "O pedacinho de lua sabia ao quê?", options: ["A queijo", "Ao que cada animal mais gostava", "A chocolate"], correct: 1 }
        ];

        const challengesData = [
            "Imita o rugido de um leão!",
            "Dá 3 saltos de coelho!",
            "Estica o pescoço como uma girafa!",
            "Anda devagarinho como a tartaruga!",
            "Faz uma tromba de elefante com o braço!",
            "Coça-te como um macaco!",
            "Faz de conta que és um peixe a nadar!",
            "Diz 'A Lua sabe a queijo' sem rir!",
            "Equilibra-te num pé só durante 5 segundos!",
            "Dá uma volta sobre ti mesmo sem cair!",
            "Faz uma careta de animal engraçado!",
            "Bate as asas como um pássaro!",
            "Imita o som de um rato (pi-pi!)",
            "Tenta tocar na ponta dos pés sem dobrar os joelhos!",
            "Dá um abraço de amizade ao outro jogador!"
        ];

        let players = [];
        let currentPlayerIndex = 0;
        let playerState = {
            'Afonso': { pos: 0, lastPos: 0, color: 'pawn-afonso', label: 'A' },
            'Filipe': { pos: 0, lastPos: 0, color: 'pawn-filipe', label: 'F' }
        };

        function startGame() {
            const isAfonso = document.getElementById('check-afonso').checked;
            const isFilipe = document.getElementById('check-filipe').checked;
            if (isAfonso) players.push('Afonso');
            if (isFilipe) players.push('Filipe');
            if (players.length === 0) return alert("Escolha um jogador!");
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').classList.remove('hidden');
            players.forEach(p => movePawn(p));
            updateUI();
        }

        function updateUI() {
            const pName = players[currentPlayerIndex];
            document.getElementById('current-player-name').innerText = pName;
            document.getElementById('pos-afonso').innerText = `Casa ${playerState['Afonso'].pos}`;
            document.getElementById('pos-filipe').innerText = `Casa ${playerState['Filipe'].pos}`;
            document.getElementById('card-afonso').style.borderColor = (pName === 'Afonso') ? '#ef4444' : '#334155';
            document.getElementById('card-filipe').style.borderColor = (pName === 'Filipe') ? '#3b82f6' : '#334155';
        }

        document.getElementById('roll-btn').onclick = function() {
            this.disabled = true;
            const die = Math.floor(Math.random() * 3) + 1; // DADO 1-3
            const diceDiv = document.getElementById('dice-result');
            diceDiv.innerText = "🎲";
            setTimeout(() => {
                diceDiv.innerText = die;
                const pName = players[currentPlayerIndex];
                playerState[pName].lastPos = playerState[pName].pos;
                playerState[pName].pos = Math.min(25, playerState[pName].pos + die);
                movePawn(pName);
                setTimeout(() => checkCellAction(playerState[pName].pos, pName), 900);
            }, 500);
        };

        function checkCellAction(pos, name) {
            if (pos === 25) {
                showModal("🏆", "Vitória!", `${name} chegou à Lua!`, [{ text: "Recomeçar", action: () => location.reload() }]);
                return;
            }
            if (questionHouses.includes(pos)) {
                showQuestionModal(questionsData[Math.floor(Math.random() * questionsData.length)]);
            } else if (challengeHouses.includes(pos)) {
                showChallengeModal(challengesData[Math.floor(Math.random() * challengesData.length)]);
            } else {
                nextTurn();
            }
        }

        function showQuestionModal(data) {
            const container = document.getElementById('modal-options');
            container.innerHTML = '';
            document.getElementById('modal-icon').innerText = "❓";
            document.getElementById('modal-title').innerText = "Pergunta da História";
            document.getElementById('modal-text').innerText = data.q;
            data.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn p-4 rounded-xl font-bold text-left bg-slate-800";
                btn.innerText = opt;
                btn.onclick = () => {
                    const all = container.querySelectorAll('button');
                    all.forEach(b => b.onclick = null);
                    if (idx === data.correct) {
                        btn.classList.add('option-correct');
                        setTimeout(closeModal, 1500);
                    } else {
                        btn.classList.add('option-wrong');
                        all[data.correct].classList.add('option-correct');
                        setTimeout(() => {
                            const p = players[currentPlayerIndex];
                            playerState[p].pos = playerState[p].lastPos;
                            movePawn(p);
                            closeModal();
                        }, 2000);
                    }
                };
                container.appendChild(btn);
            });
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function showChallengeModal(text) {
            const container = document.getElementById('modal-options');
            container.innerHTML = '';
            document.getElementById('modal-icon').innerText = "⭐";
            document.getElementById('modal-title').innerText = "Desafio!";
            document.getElementById('modal-text').innerText = text;
            
            const b1 = document.createElement('button');
            b1.className = "p-4 bg-green-600 rounded-xl font-bold";
            b1.innerText = "Consegui! ✅";
            b1.onclick = closeModal;

            const b2 = document.createElement('button');
            b2.className = "p-4 bg-red-900 rounded-xl font-bold";
            b2.innerText = "Não consegui... ❌";
            b2.onclick = () => {
                const p = players[currentPlayerIndex];
                playerState[p].pos = playerState[p].lastPos;
                movePawn(p);
                closeModal();
            };

            container.append(b1, b2);
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function showModal(icon, title, text, buttons) {
            const container = document.getElementById('modal-options');
            container.innerHTML = '';
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            buttons.forEach(b => {
                const btn = document.createElement('button');
                btn.className = "p-4 bg-blue-600 rounded-xl font-bold";
                btn.innerText = b.text;
                btn.onclick = b.action;
                container.appendChild(btn);
            });
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('event-modal').classList.add('hidden');
            nextTurn();
        }

        function nextTurn() {
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            document.getElementById('roll-btn').disabled = false;
            updateUI();
        }

        function movePawn(name) {
            const pos = playerState[name].pos;
            let pawn = document.getElementById('pawn-' + name);
            if (!pawn) {
                pawn = document.createElement('div');
                pawn.id = 'pawn-' + name;
                pawn.className = 'pawn ' + playerState[name].color;
                pawn.innerText = playerState[name].label;
                document.getElementById('pawns-container').appendChild(pawn);
            }
            pawn.style.left = gameCoordinates[pos].x + '%';
            pawn.style.top = gameCoordinates[pos].y + '%';
        }
    </script>
</body>
</html>
