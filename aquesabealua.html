<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Que Sabe a Lua - Jogo Interativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .board-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: fit-content;
        }
        #board-img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
        }
        .pawn {
            position: absolute;
            width: 4%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            transform: translate(-50%, -50%);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            font-size: 1.2vw;
            pointer-events: none;
        }
        .pawn-afonso { background-color: #ef4444; border: 0.2vw solid #ffffff; }
        .pawn-filipe { background-color: #3b82f6; border: 0.2vw solid #ffffff; }
        
        #board-wrapper::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        #board-wrapper::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }
        
        .option-btn {
            transition: all 0.2s;
            border: 2px solid #334155;
        }
        .option-btn:hover {
            border-color: #3b82f6;
            background-color: #1e293b;
        }
        .option-correct {
            border-color: #10b981 !important;
            background-color: #064e3b !important;
        }
        .option-wrong {
            border-color: #ef4444 !important;
            background-color: #7f1d1d !important;
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans overflow-hidden">

    <!-- Ecrã de Configuração -->
    <div id="setup-screen" class="flex flex-col items-center justify-center h-screen space-y-6">
        <h1 class="text-5xl font-black text-yellow-400 tracking-tighter drop-shadow-md text-center px-4 uppercase">A Que Sabe a Lua?</h1>
        <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl border border-slate-800 w-full max-w-md text-center mx-4">
            <h2 class="text-xl mb-6 font-semibold">Quem vai jogar?</h2>
            
            <div class="space-y-6 text-left">
                <div class="space-y-4 bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <div class="flex flex-col gap-3">
                        <label class="flex items-center justify-between cursor-pointer p-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors border-2 border-transparent has-[:checked]:border-red-500">
                            <span class="flex items-center gap-3">
                                <span class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center font-bold">A</span>
                                <span>Afonso</span>
                            </span>
                            <input type="checkbox" id="check-afonso" class="w-6 h-6 rounded border-slate-500 text-red-500 focus:ring-red-500">
                        </label>
                        <label class="flex items-center justify-between cursor-pointer p-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors border-2 border-transparent has-[:checked]:border-blue-500">
                            <span class="flex items-center gap-3">
                                <span class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">F</span>
                                <span>Filipe</span>
                            </span>
                            <input type="checkbox" id="check-filipe" class="w-6 h-6 rounded border-slate-500 text-blue-500 focus:ring-blue-500">
                        </label>
                    </div>
                </div>

                <button onclick="startGame()" class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-black text-lg rounded-xl transition-transform active:scale-95 shadow-xl">
                    COMEÇAR AVENTURA
                </button>
            </div>
        </div>
    </div>

    <!-- Ecrã de Jogo -->
    <div id="game-screen" class="hidden flex flex-col lg:flex-row h-screen p-4 gap-4 overflow-hidden">
        
        <!-- Lado Esquerdo: Tabuleiro -->
        <div id="board-wrapper" class="flex-grow flex items-center justify-center overflow-auto bg-slate-900 rounded-2xl border-4 border-slate-800 relative shadow-inner p-2">
            <div class="board-container" id="board-container">
                <img id="board-img" src="https://profjoaoav.github.io/CREDAV/tabuleiro2.png" alt="Tabuleiro">
                <div id="pawns-container"></div>
            </div>
        </div>

        <!-- Lado Direito: Controlos -->
        <div class="lg:w-80 flex flex-col gap-4 h-full shrink-0">
            
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl flex flex-col justify-center">
                <h2 class="text-xl font-bold text-yellow-400 mb-4 flex items-center gap-2">
                    <span>🎮</span> Jogo
                </h2>
                
                <div id="turn-info" class="mb-4 p-4 bg-slate-800 rounded-xl border border-slate-700 text-center">
                    <p class="text-xs uppercase text-slate-500 font-bold mb-1">Vez de:</p>
                    <span id="current-player-name" class="text-2xl font-black text-white">-</span>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-6 text-center">
                    <div id="card-afonso" class="p-3 bg-slate-800 border border-slate-700 rounded-lg transition-colors">
                        <p class="text-[10px] uppercase text-slate-400">Afonso</p>
                        <p id="pos-afonso" class="font-bold text-sm">Casa 0</p>
                    </div>
                    <div id="card-filipe" class="p-3 bg-slate-800 border border-slate-700 rounded-lg transition-colors">
                        <p class="text-[10px] uppercase text-slate-400">Filipe</p>
                        <p id="pos-filipe" class="font-bold text-sm">Casa 0</p>
                    </div>
                </div>

                <button id="roll-btn" class="w-full py-6 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-black text-3xl rounded-2xl transition-all shadow-[0_6px_0_rgb(202,138,4)] active:shadow-none active:translate-y-1 mb-4 disabled:opacity-50 disabled:cursor-not-allowed">
                    DADO 🎲 (1-3)
                </button>
                <div id="dice-result" class="text-center h-16 text-5xl font-black text-yellow-400"></div>
            </div>

            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 flex-grow flex flex-col">
                <h3 class="font-bold text-blue-400 mb-2">📍 Regras Especiais</h3>
                <p id="hint-text" class="text-sm text-slate-400 italic">
                    Dado de 3 faces para o jogo durar mais!<br><br>
                    Azul (?) = Pergunta<br>Estrela = Desafio<br>
                    <span class="text-red-400 font-bold">⚠️ Se falhares, voltas à casa de onde vieste!</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Modal de Eventos -->
    <div id="event-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
        <div class="bg-slate-900 border-2 border-blue-500 p-8 rounded-3xl max-w-lg w-full shadow-2xl text-center">
            <div id="modal-icon" class="text-5xl mb-4">❓</div>
            <h3 id="modal-title" class="text-blue-400 font-bold uppercase tracking-widest text-sm mb-2">Desafio</h3>
            <p id="modal-text" class="text-xl font-medium mb-8 leading-relaxed italic"></p>
            
            <div id="modal-options" class="flex flex-col gap-3">
                <!-- Botões dinâmicos aqui -->
            </div>
        </div>
    </div>

    <script>
        const gameCoordinates = [
            {"x": 16.28, "y": 82.82}, {"x": 25.38, "y": 82.65}, {"x": 32.73, "y": 81.97},
            {"x": 41.55, "y": 82.98}, {"x": 52.76, "y": 82.48}, {"x": 59.92, "y": 82.98},
            {"x": 68.38, "y": 81.8}, {"x": 78.21, "y": 75.07}, {"x": 74.17, "y": 56.87},
            {"x": 65.25, "y": 56.87}, {"x": 56.8, "y": 55.69}, {"x": 47.79, "y": 57.38},
            {"x": 38.24, "y": 56.7}, {"x": 31.35, "y": 56.2}, {"x": 19.77, "y": 52.66},
            {"x": 12.24, "y": 50.64}, {"x": 7.64, "y": 33.96}, {"x": 18.76, "y": 29.92},
            {"x": 25.56, "y": 29.41}, {"x": 35.3, "y": 35.82}, {"x": 44.85, "y": 34.64},
            {"x": 52.48, "y": 33.96}, {"x": 64.7, "y": 31.77}, {"x": 72.33, "y": 27.39},
            {"x": 79.4, "y": 19.14}, {"x": 90.06, "y": 13.75}
        ];

        const questionHouses = [2, 6, 9, 11, 15, 17, 21, 23];
        const challengeHouses = [3, 5, 8, 12, 14, 18, 20, 24];
        
        const questionsData = [
            { q: "Quem foi o primeiro animal a tentar chegar à lua?", options: ["Tartaruga", "Elefante", "Girafa"], correct: 0 },
            { q: "Qual foi o animal que subiu para as costas da tartaruga?", options: ["Zebra", "Elefante", "Leão"], correct: 1 },
            { q: "Qual é o animal que tem o pescoço mais comprido?", options: ["Girafa", "Elefante", "Zebra"], correct: 0 },
            { q: "Qual foi o animal que finalmente deu uma trinca na lua?", options: ["Leão", "Macaco", "Rato"], correct: 2 },
            { q: "Quem ficou na base da torre de animais?", options: ["Elefante", "Tartaruga", "Peixe"], correct: 1 },
            { q: "Quem foi o último animal a subir?", options: ["Rato", "Macaco", "Zebra"], correct: 0 },
            { q: "Os animais ajudaram-se uns aos outros?", options: ["Não", "Sim", "Não sei"], correct: 1 },
            { q: "Como se sentiam os animais quando não alcançavam a lua?", options: ["Cansados", "Felizes", "Zangados"], correct: 0 },
            { q: "Todos os animais provaram a lua?", options: ["Sim, o rato deu a cada um um pedacinho", "Não, só o rato", "Não, só o peixe"], correct: 0 },
            { q: "O que nos ensina esta história?", options: ["União e Amizade", "Correr mais que os outros", "Dormir muito"], correct: 0 }
        ];

        const challengesData = [
            "Imita o som de um Leão bem forte!",
            "Dá 3 saltos como se fosses um Coelho!",
            "Finge que tens um pescoço de Girafa e estica-te bem!",
            "Faz uma cara de preguiça como a Tartaruga!",
            "Imita o andar pesado de um Elefante!",
            "Tenta coçar-te como um Macaco!",
            "Faz de conta que és um peixe a nadar!",
            "Diz 'A Lua sabe a queijo' sem rir!"
        ];

        let players = [];
        let currentPlayerIndex = 0;
        let playerState = {
            'Afonso': { pos: 0, lastPos: 0, color: 'pawn-afonso', label: 'A' },
            'Filipe': { pos: 0, lastPos: 0, color: 'pawn-filipe', label: 'F' }
        };

        function startGame() {
            const isAfonso = document.getElementById('check-afonso').checked;
            const isFilipe = document.getElementById('check-filipe').checked;

            if (isAfonso) players.push('Afonso');
            if (isFilipe) players.push('Filipe');

            if (players.length === 0) return alert("Seleciona pelo menos um jogador.");

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            players.forEach(p => movePawn(p));
            updateUI();
        }

        function updateUI() {
            const pName = players[currentPlayerIndex];
            if (!pName) return;
            document.getElementById('current-player-name').innerText = pName;
            document.getElementById('pos-afonso').innerText = `Casa ${playerState['Afonso'].pos}`;
            document.getElementById('pos-filipe').innerText = `Casa ${playerState['Filipe'].pos}`;

            document.getElementById('card-afonso').style.borderColor = (pName === 'Afonso') ? '#ef4444' : '#334155';
            document.getElementById('card-filipe').style.borderColor = (pName === 'Filipe') ? '#3b82f6' : '#334155';
        }

        document.getElementById('roll-btn').onclick = function() {
            const btn = this;
            btn.disabled = true;

            // DADO DE 3 FACES (1, 2, 3)
            const die = Math.floor(Math.random() * 3) + 1;
            const diceDiv = document.getElementById('dice-result');
            diceDiv.innerText = "🎲";
            
            setTimeout(() => {
                diceDiv.innerText = die;
                const pName = players[currentPlayerIndex];
                
                // Guardamos a posição anterior
                playerState[pName].lastPos = playerState[pName].pos;
                
                let newPos = playerState[pName].pos + die;
                if (newPos > 25) newPos = 25;

                playerState[pName].pos = newPos;
                movePawn(pName);

                setTimeout(() => checkCellAction(newPos, pName), 900);
            }, 500);
        };

        function checkCellAction(pos, name) {
            if (pos === 25) {
                showModal("🏆", "Vitória", `${name} chegou à Lua e descobriu o seu sabor!`, [{ text: "Celebrar!", action: () => location.reload() }]);
                return;
            }

            if (questionHouses.includes(pos)) {
                // Escolhe pergunta baseada na posição para variar
                const data = questionsData[pos % questionsData.length];
                showQuestionModal(data);
            } else if (challengeHouses.includes(pos)) {
                const text = challengesData[pos % challengesData.length];
                showChallengeModal(text);
            } else {
                nextTurn();
            }
        }

        function showQuestionModal(data) {
            const container = document.getElementById('modal-options');
            container.innerHTML = '';
            document.getElementById('modal-icon').innerText = "❓";
            document.getElementById('modal-title').innerText = "Pergunta da História";
            document.getElementById('modal-text').innerText = data.q;

            const pName = players[currentPlayerIndex];

            data.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn p-4 rounded-xl font-bold text-left";
                btn.innerText = opt;
                btn.onclick = () => {
                    const allBtns = container.querySelectorAll('button');
                    allBtns.forEach(b => b.onclick = null);
                    
                    if (idx === data.correct) {
                        btn.classList.add('option-correct');
                        setTimeout(() => closeModal(), 1500);
                    } else {
                        btn.classList.add('option-wrong');
                        allBtns[data.correct].classList.add('option-correct');
                        
                        // Recuar para a casa de onde veio
                        setTimeout(() => {
                            playerState[pName].pos = playerState[pName].lastPos;
                            movePawn(pName);
                            closeModal();
                        }, 2000);
                    }
                };
                container.appendChild(btn);
            });

            document.getElementById('event-modal').classList.remove('hidden');
        }

        function showChallengeModal(challengeText) {
            const container = document.getElementById('modal-options');
            container.innerHTML = '';
            document.getElementById('modal-icon').innerText = "⭐";
            document.getElementById('modal-title').innerText = "Desafio Físico";
            document.getElementById('modal-text').innerText = challengeText;

            const pName = players[currentPlayerIndex];

            const btnSim = document.createElement('button');
            btnSim.className = "p-4 bg-green-600 rounded-xl font-bold hover:bg-green-500";
            btnSim.innerText = "Consegui superar! ✅";
            btnSim.onclick = () => closeModal();

            const btnNao = document.createElement('button');
            btnNao.className = "p-4 bg-red-900 rounded-xl font-bold hover:bg-red-800";
            btnNao.innerText = "Não consegui... ❌";
            btnNao.onclick = () => {
                // Recuar para a casa de onde veio
                playerState[pName].pos = playerState[pName].lastPos;
                movePawn(pName);
                closeModal();
            };

            container.appendChild(btnSim);
            container.appendChild(btnNao);
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function showModal(icon, title, text, buttons) {
            const container = document.getElementById('modal-options');
            container.innerHTML = '';
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;

            buttons.forEach(b => {
                const btn = document.createElement('button');
                btn.className = "p-4 bg-blue-600 rounded-xl font-bold";
                btn.innerText = b.text;
                btn.onclick = b.action;
                container.appendChild(btn);
            });
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('event-modal').classList.add('hidden');
            nextTurn();
        }

        function nextTurn() {
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            document.getElementById('roll-btn').disabled = false;
            updateUI();
        }

        function movePawn(name) {
            const pos = playerState[name].pos;
            let pawn = document.getElementById('pawn-' + name);
            if (!pawn) {
                pawn = document.createElement('div');
                pawn.id = 'pawn-' + name;
                pawn.className = 'pawn ' + playerState[name].color;
                pawn.innerText = playerState[name].label;
                document.getElementById('pawns-container').appendChild(pawn);
            }
            pawn.style.left = gameCoordinates[pos].x + '%';
            pawn.style.top = gameCoordinates[pos].y + '%';
            adjustOverlappingPawns(pos);
        }

        function adjustOverlappingPawns(pos) {
            const afonsoPawn = document.getElementById('pawn-Afonso');
            const filipePawn = document.getElementById('pawn-Filipe');
            if (afonsoPawn && filipePawn && playerState['Afonso'].pos === playerState['Filipe'].pos) {
                afonsoPawn.style.transform = "translate(-110%, -50%)";
                filipePawn.style.transform = "translate(10%, -50%)";
            } else {
                if(afonsoPawn) afonsoPawn.style.transform = "translate(-50%, -50%)";
                if(filipePawn) filipePawn.style.transform = "translate(-50%, -50%)";
            }
        }
    </script>
</body>
</html>
