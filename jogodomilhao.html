            const addPlayer = (pawn) => {
                if (players.length >= 4 || players.some(p => p.pawn.id === pawn.id)) return;
                setPlayers([...players, { id: players.length + 1, pawn, pos: 0, skipTurns: 0 }]);
            };

            const removePlayer = (id) => setPlayers(players.filter(p => p.id !== id));
            
            const startGame = () => { if (players.length > 0) setGameState('PLAYING'); };

            // --- LÓGICA DE TURNOS ---
            const endTurn = () => {
                let nextIdx = (currentPlayerIdx + 1) % players.length;
                let nextPlayer = players[nextIdx];
                
                let updatedPlayers = [...players];
                let loopCount = 0;
                while (nextPlayer.skipTurns > 0 && loopCount < players.length) {
                    updatedPlayers[nextIdx].skipTurns -= 1;
                    nextIdx = (nextIdx + 1) % players.length;
                    nextPlayer = updatedPlayers[nextIdx];
                    loopCount++;
                }
                
                setPlayers(updatedPlayers);
                setCurrentPlayerIdx(nextIdx);
                setDiceRoll(null);
            };

            // --- ANIMAR DADO ---
            const rollDice = () => {
                if (isRolling || modal.isOpen) return;
                setIsRolling(true);
                let rolls = 0;
                const interval = setInterval(() => {
                    setDiceRoll(Math.floor(Math.random() * 6) + 1);
                    rolls++;
                    if (rolls > 8) {
                        clearInterval(interval);
                        const finalRoll = Math.floor(Math.random() * 6) + 1;
                        setDiceRoll(finalRoll);
                        setIsRolling(false);
                        handleMovement(finalRoll);
                    }
                }, 100);
            };

            const updatePlayerPosition = (idx, newPos, cb) => {
                setPlayers(prev => {
                    const newPlayers = [...prev];
                    newPlayers[idx].pos = newPos;
                    return newPlayers;
                });
                setTimeout(() => { if (cb) cb(); }, 600);
            };

            const handleMovement = (roll) => {
                const player = players[currentPlayerIdx];
                let targetPos = player.pos + roll;

                // REGRA: Chegar exatamente à casa 80
                if (targetPos >= PATH.length) {
                    targetPos = player.pos; 
                    setModal({ isOpen: true, type: 'info', data: { title: "Quase lá!", text: "Precisas do número exato para chegar à meta. Passa a vez." }});
                    return;
                }
                updatePlayerPosition(currentPlayerIdx, targetPos, () => checkTileEvent(targetPos));
            };

            // --- AÇÕES DAS CASAS ---
            const checkTileEvent = (pos) => {
                if (pos === PATH.length - 1) {
                    setGameState('ENDED');
                    return;
                }
                const tile = SPECIAL_TILES[pos];
                if (!tile) {
                    endTurn();
                    return;
                }
                switch (tile.type) {
                    case 'candy':
                        setModal({ isOpen: true, type: 'info', data: { title: "Casa dos Doces!", text: "Gastaste muito em guloseimas. Ficas 3 vezes sem jogar!" }});
                        setPlayers(prev => { const np = [...prev]; np[currentPlayerIdx].skipTurns = 3; return np; });
                        break;
                    case 'redX':
                        setModal({ isOpen: true, type: 'info', data: { title: "Mealheiro Partido!", text: "Má gestão financeira. Volta ao início!" }});
                        updatePlayerPosition(currentPlayerIdx, 0, null);
                        break;
                    case 'dice':
                        setModal({ isOpen: true, type: 'info', data: { title: "Sorte!", text: "Jogas de novo!", extraTurn: true }});
                        break;
                    case 'arrow':
                        setModal({ isOpen: true, type: 'info', data: { title: "Bom Hábito!", text: "Avança 2 casas extra.", advance: 2 }});
                        break;
                    case 'piggy':
                        handlePiggyBank(pos);
                        break;
                    case 'question':
                        const randomQ = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
                        setModal({ isOpen: true, type: 'question', data: randomQ });
                        break;
                    case 'luck':
                        const randomLuck = LUCK_CARDS[Math.floor(Math.random() * LUCK_CARDS.length)];
                        setModal({ isOpen: true, type: 'luck', data: randomLuck });
                        break;
                    default:
                        endTurn();
                }
            };

            const handlePiggyBank = (currentPos) => {
                const piggyTiles = Object.keys(SPECIAL_TILES).filter(k => SPECIAL_TILES[k].type === 'piggy').map(Number).sort((a,b)=>a-b);
                const nextPiggy = piggyTiles.find(p => p > currentPos);
                if (nextPiggy) {
                    setModal({ isOpen: true, type: 'info', data: { title: "Bichinho da Poupança!", text: `Avanças direto para a casa ${nextPiggy}!`, advanceTo: nextPiggy }});
                } else {
                    setModal({ isOpen: true, type: 'info', data: { title: "Bichinho da Poupança!", text: "Já guardaste muito bem as tuas moedas." }});
                }
            };

            // Processar Popups
            const handleModalAction = (actionData) => {
                setModal({ isOpen: false, type: '', data: null });
                if (actionData?.extraTurn) { setDiceRoll(null); return; }
                
                // Salto do Porquinho - Termina o turno imediatamente após viajar para evitar reações em cadeia
                if (actionData?.advanceTo !== undefined) { 
                    updatePlayerPosition(currentPlayerIdx, actionData.advanceTo, () => endTurn()); 
                    return; 
                }
                
                if (actionData?.advance !== undefined) { 
                    const newPos = Math.min(PATH.length - 1, players[currentPlayerIdx].pos + actionData.advance); 
                    updatePlayerPosition(currentPlayerIdx, newPos, () => checkTileEvent(newPos)); 
                    return; 
                }
                endTurn();
            };

            const handleQuestionAnswer = (idx) => {
                if (idx === modal.data.correct) {
                    setModal({ isOpen: true, type: 'info', data: { title: "Correto!", text: "Avança 1 casa de bónus!", advance: 1 }});
                } else {
                    setModal({ isOpen: true, type: 'info', data: { title: "Incorreto!", text: "Ficas no mesmo sítio. Mais sorte na próxima!" }});
                }
            };

            const handleLuckAction = () => {
                const action = modal.data.action;
                const value = modal.data.value;
                setModal({ isOpen: false, type: '', data: null });
                if (action === "EXTRA_TURN") { setDiceRoll(null); return; }
                if (action === "MOVE") { let newPos = Math.max(0, players[currentPlayerIdx].pos + value); updatePlayerPosition(currentPlayerIdx, newPos, () => checkTileEvent(newPos)); return; }
                if (action === "SKIP") { setPlayers(prev => { const np = [...prev]; np[currentPlayerIdx].skipTurns += value; return np; }); endTurn(); return; }
                endTurn();
            };

            // --- VISTA DE CONFIGURAÇÃO ---
            if (gameState === 'SETUP') {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 md:p-8 text-white font-sans overflow-y-auto relative">
                        <div className="bg-white text-slate-800 p-6 md:p-8 rounded-2xl shadow-2xl max-w-4xl w-full text-center my-auto">
                            <h1 className="text-4xl md:text-5xl font-extrabold mb-4 text-emerald-600">A Jornada do Milhão</h1>
                            <p className="text-lg md:text-xl mb-8 text-slate-500">Escolham os vossos peões para começar a aventura!</p>
                            
                            <div className="flex flex-wrap justify-center gap-4 md:gap-6 mb-8">
                                {PAWNS.map(pawn => {
                                    const isSelected = players.find(p => p.pawn.id === pawn.id);
                                    return (
                                        <div 
                                            key={pawn.id} 
                                            onClick={() => isSelected ? removePlayer(isSelected.id) : addPlayer(pawn)}
                                            className={`cursor-pointer transition-all duration-300 rounded-xl p-3 border-4 w-32 md:w-40 flex flex-col items-center
                                                ${isSelected ? 'border-emerald-500 bg-emerald-50 scale-105' : 'border-slate-200 hover:border-emerald-300 hover:bg-slate-50'}`}
                                        >
                                            <img src={pawn.img} alt={pawn.name} className="w-20 h-20 md:w-24 md:h-24 object-contain drop-shadow-md mb-2" />
                                            <span className="font-bold text-base md:text-lg">{pawn.name}</span>
                                            {isSelected && <span className="text-[10px] md:text-xs text-emerald-600 font-bold uppercase mt-1">Selecionado</span>}
                                        </div>
                                    )
                                })}
                            </div>

                            <div className="flex flex-col md:flex-row justify-center items-center gap-4 border-t pt-6">
                                <span className="text-slate-500 font-medium">Jogadores: {players.length}/4</span>
                                <button 
                                    onClick={startGame}
                                    disabled={players.length === 0}
                                    className={`px-8 py-4 rounded-full font-bold text-lg flex items-center justify-center gap-2 transition-all w-full md:w-auto
                                        ${players.length > 0 ? 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-lg hover:shadow-emerald-500/50' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                                >
                                    <IconPlay size={24} /> Começar Jogo
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- VISTA DE FIM DE JOGO ---
            if (gameState === 'ENDED') {
                return (
                    <div className="min-h-screen bg-emerald-600 flex flex-col items-center justify-center p-8 text-white font-sans text-center">
                        <IconTrophy size={100} className="text-yellow-300 mb-6 drop-shadow-lg mx-auto" />
                        <h1 className="text-6xl font-extrabold mb-4 drop-shadow-md">Parabéns!</h1>
                        <h2 className="text-3xl mb-8">O jogador {players[currentPlayerIdx].pawn.name} alcançou o Milhão!</h2>
                        <img src={players[currentPlayerIdx].pawn.img} alt="Vencedor" className="w-48 h-48 object-contain mb-8 drop-shadow-2xl mx-auto" />
                        <button onClick={() => window.location.reload()} className="px-8 py-4 bg-white text-emerald-700 rounded-full font-bold text-xl hover:bg-slate-100 shadow-xl">
                            Jogar Novamente
                        </button>
                    </div>
                );
            }

            // --- VISTA DO TABULEIRO E PAINEL ---
            return (
                <div className="flex flex-col lg:flex-row h-screen w-full bg-slate-100 font-sans overflow-hidden relative">
                    
                    {/* TABULEIRO (LADO ESQUERDO) */}
                    <div className="flex-1 h-[55vh] lg:h-full p-2 md:p-8 flex items-center justify-center bg-slate-800 relative z-10 overflow-hidden">
                        <div className="relative inline-block shadow-2xl rounded border-4 border-slate-700 bg-slate-900">
                            <img 
                                src={BOARD_IMG} 
                                alt="Tabuleiro" 
                                className="block max-w-full max-h-[50vh] lg:max-h-[90vh] rounded pointer-events-none"
                            />

                            <div className="absolute inset-0 pointer-events-none overflow-hidden rounded">
                                
                                {/* 1. Renderizar os Marcadores de Pergunta Virtuais (?) */}
                                {Object.entries(SPECIAL_TILES).map(([posStr, tile]) => {
                                    if (tile.type !== 'question') return null;
                                    const pos = parseInt(posStr);
                                    const posData = PATH[pos];
                                    if (!posData) return null;

                                    return (
                                        <div 
                                            key={`q-marker-${pos}`}
                                            className="absolute z-10 flex items-center justify-center opacity-95 transition-opacity"
                                            style={{ 
                                                left: `calc(${posData.x}%)`, 
                                                top: `calc(${posData.y}%)`,
                                                transform: 'translate(-50%, -50%)'
                                            }}
                                        >
                                            <div className="bg-blue-500 text-white rounded-full p-[3px] shadow-lg border-2 border-white animate-pulse drop-shadow-[0_0_5px_rgba(59,130,246,0.6)]">
                                                <IconHelpCircle size={16} />
                                            </div>
                                        </div>
                                    );
                                })}

                                {/* 2. Renderizar os Peões dos Jogadores */}
                                {players.map((player, idx) => {
                                    const posData = PATH[player.pos];
                                    if(!posData) return null; 
                                    
                                    const playersInSameHouse = players.filter(p => p.pos === player.pos);
                                    const pIndex = playersInSameHouse.findIndex(p => p.id === player.id);
                                    
                                    const offsetX = pIndex === 0 ? 0 : pIndex === 1 ? 1.5 : pIndex === 2 ? -1.5 : 0;
                                    const offsetY = pIndex === 0 ? 0 : pIndex === 1 ? 1 : pIndex === 2 ? -1 : -1;

                                    return (
                                        <div 
                                            key={player.id}
                                            className="absolute z-20 transition-all duration-700 ease-in-out drop-shadow-[0_4px_4px_rgba(0,0,0,0.6)] pointer-events-auto"
                                            style={{ 
                                                left: `calc(${posData.x}% + ${offsetX}%)`, 
                                                top: `calc(${posData.y}% + ${offsetY}%)`,
                                                width: '8%', height: '8%',
                                                minWidth: '35px', minHeight: '35px',
                                                transform: 'translate(-50%, -85%)'
                                            }}
                                        >
                                            <img 
                                                src={player.pawn.img} 
                                                className={`w-full h-full object-contain ${currentPlayerIdx === idx ? 'animate-bounce drop-shadow-[0_0_12px_rgba(255,255,255,0.9)] scale-110' : ''}`} 
                                                alt={player.pawn.name}
                                            />
                                            <div className={`absolute -top-1 -right-1 w-5 h-5 rounded-full ${player.pawn.color} text-white text-[10px] font-bold flex items-center justify-center border-2 border-white shadow-md`}>
                                                {idx + 1}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* PAINEL DE INFORMAÇÃO E CONTROLOS (LADO DIREITO) */}
                    <div className="w-full lg:w-[350px] xl:w-[400px] h-[45vh] lg:h-full bg-white flex flex-col shadow-[-10px_0_15px_-3px_rgba(0,0,0,0.2)] z-30 overflow-y-auto relative">
                        
                        <div className="text-white p-4 text-center shrink-0 bg-emerald-600 transition-colors">
                            <h2 className="text-xl font-black uppercase tracking-wider">A Jornada do Milhão</h2>
                        </div>

                        <div className="p-4 bg-slate-50 border-b border-slate-200 shrink-0">
                            <h3 className="text-xs font-bold text-slate-400 uppercase mb-2 tracking-wide text-center">Jogadores</h3>
                            <div className="grid grid-cols-2 gap-2">
                                {players.map((p, idx) => (
                                    <div key={p.id} className={`p-2 rounded-lg border-2 flex items-center gap-2 transition-colors ${currentPlayerIdx === idx ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200 bg-white'}`}>
                                        <img src={p.pawn.img} alt={p.name} className="w-8 h-8 object-contain" />
                                        <div className="flex flex-col text-left overflow-hidden">
                                        <span className="font-bold text-slate-700 text-xs truncate">{p.pawn.name}</span>
                                        <span className="text-[10px] text-slate-500 font-medium">Casa {p.pos}</span>
                                        {p.skipTurns > 0 && <span className="text-[9px] text-red-600 font-bold leading-none mt-0.5">Preso: {p.skipTurns}</span>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="p-6 flex flex-col items-center justify-center bg-white border-b border-slate-200 shrink-0">
                            <div className="text-center mb-4">
                                <span className="block text-xs font-bold text-slate-400 uppercase tracking-wide">A Jogar:</span>
                                <span className="block text-2xl font-black text-emerald-600">{players[currentPlayerIdx]?.pawn.name}</span>
                            </div>

                            <div className="bg-slate-100 w-24 h-24 rounded-2xl flex items-center justify-center shadow-inner border border-slate-200 mb-6">
                                {isRolling ? <div className="animate-spin">{getDiceIcon(6)}</div> : getDiceIcon(diceRoll)}
                            </div>

                            <button 
                                onClick={rollDice}
                                disabled={isRolling || modal.isOpen}
                                className={`w-full py-4 rounded-xl font-black text-lg uppercase tracking-wider transition-all shadow-md
                                    ${(isRolling || modal.isOpen)
                                        ? 'bg-slate-200 text-slate-400 cursor-not-allowed' 
                                        : 'bg-emerald-500 text-white hover:bg-emerald-600 hover:-translate-y-1 hover:shadow-emerald-500/40 active:translate-y-0'}`}
                            >
                                {isRolling ? 'A rolar...' : 'Lançar Dado'}
                            </button>
                        </div>

                        <div className="p-5 bg-slate-50 text-sm flex-1">
                            <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><IconInfo size={16} /> Regras Especiais</h3>
                            <ul className="space-y-3">
                                <li className="flex items-start gap-2"><div className="w-5 h-5 mt-0.5 rounded-full bg-pink-200 border border-pink-400 flex-shrink-0"></div><span className="text-slate-600"><strong className="text-slate-800">Porquinho:</strong> Avança para o próximo Porquinho.</span></li>
                                <li className="flex items-start gap-2"><IconAlertCircle size={20} className="text-red-500 flex-shrink-0" /><span className="text-slate-600"><strong className="text-slate-800">Doces:</strong> Gastos excessivos. Perde 3 turnos.</span></li>
                                <li className="flex items-start gap-2"><IconAlertTriangle size={20} className="text-red-600 flex-shrink-0" /><span className="text-slate-600"><strong className="text-slate-800">X Vermelho:</strong> Mealheiro partido. Volta ao início.</span></li>
                                <li className="flex items-start gap-2"><IconHelpCircle size={20} className="text-blue-500 flex-shrink-0" /><span className="text-slate-600"><strong className="text-slate-800">Desafio (?):</strong> Responde para avançar ou ficar no sítio.</span></li>
                                <li className="flex items-start gap-2"><IconStar size={20} className="text-yellow-500 fill-yellow-500 flex-shrink-0" /><span className="text-slate-600"><strong className="text-slate-800">Sorte/Azar (★):</strong> Acontecimento surpresa.</span></li>
                            </ul>
                        </div>
                    </div>

                    {/* MODAIS (Popups de Alerta / Perguntas) */}
                    {modal.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden transition-all transform scale-100">
                                
                                {modal.type === 'info' && (
                                    <div className="p-8 text-center">
                                        <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <IconInfo size={32} />
                                        </div>
                                        <h3 className="text-2xl font-black text-slate-800 mb-2">{modal.data.title}</h3>
                                        <p className="text-slate-600 text-lg mb-8">{modal.data.text}</p>
                                        <button onClick={() => handleModalAction(modal.data)} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-lg">
                                            Continuar
                                        </button>
                                    </div>
                                )}

                                {modal.type === 'question' && (
                                    <div className="p-6 md:p-8">
                                        <div className="flex items-center gap-3 mb-6 border-b pb-4">
                                            <IconHelpCircle size={28} className="text-emerald-500 shrink-0" />
                                            <h3 className="text-xl font-black text-slate-800">Hora do Desafio!</h3>
                                        </div>
                                        <p className="text-lg font-medium text-slate-700 mb-6">{modal.data.q}</p>
                                        <div className="space-y-3 mb-4">
                                            {modal.data.options.map((opt, idx) => (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => handleQuestionAnswer(idx)}
                                                    className="w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-emerald-500 hover:bg-emerald-50 transition-colors font-medium text-slate-700 text-sm md:text-base"
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {modal.type === 'luck' && (
                                    <div className="p-8 text-center">
                                        <div className="w-16 h-16 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                                            <IconStar size={32} className="fill-amber-500" />
                                        </div>
                                        <h3 className="text-2xl font-black text-slate-800 mb-2">Carta de Sorte ou Azar</h3>
                                        <p className="text-slate-700 text-lg md:text-xl font-medium italic bg-amber-50 p-6 rounded-xl border border-amber-200 mb-8 mt-4">
                                            "{modal.data.text}"
                                        </p>
                                        <button onClick={handleLuckAction} className="w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-xl font-bold text-lg shadow-lg">
                                            Cumprir Destino
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- ARRANQUE DA APLICAÇÃO ---
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
